name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint, Typecheck, Build, Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: murai_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: Lint
        run: pnpm biome ci .

      - name: Typecheck
        run: pnpm turbo typecheck

      - name: Build
        run: pnpm turbo build

      - name: Test
        run: pnpm turbo test -- --coverage

      - name: Integration tests
        run: pnpm --filter @murai/storage-drizzle test
        env:
          DATABASE_URL: postgres://test:test@localhost:5432/murai_test

      - name: Validate packages
        run: |
          pnpm exec publint ./packages/core
          pnpm exec publint ./packages/murai
          pnpm exec publint ./packages/gateway-midtrans
          pnpm exec publint ./packages/gateway-xendit
          pnpm exec publint ./packages/gateway-stripe
          pnpm exec publint ./packages/storage-drizzle
